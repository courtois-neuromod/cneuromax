# @package _global_

defaults:
  - friends_video_transformer/data@subject_data: ???

datamodule:
  _target_:
    "cneuromax.deeplearning.experiment.friends_video_transformer.\
    datamodule.FriendsDataModule"
  config:
    _target_:
      "cneuromax.deeplearning.experiment.friends_video_transformer.\
      datamodule.FriendsDataModuleConfig"
    subject: ${subject_data.subject}
    episode_list: ${subject_data.episodes}
    use_bold: True
    modalities: [frames, bold]
    mkv_data_dir: "/home/mstlaure/projects/rrg-pbellec/mstlaure/\
      deepgaze_mr/data/friends_s6"
    lazy_loading_dir: "/home/mstlaure/projects/rrg-pbellec/\
      mstlaure/multimodal_proj/lazy_loading/friends_frames"
    original_fps: 29.97
    time_downsample: 2
    n_chunks: 3
    resize_dim: 128
    dtype: float32
    min_lag: 3
    max_lag: 5
    tr: 1.49
    nifti_data_dir: "/home/mstlaure/projects/rrg-pbellec/mstlaure\
      /deepgaze_mr/data/friends_T1w"
    mask_path: "/home/mstlaure/projects/rrg-pbellec/mstlaure/\
      multimodal_proj/masks/${subject_data.subject}_mask.nii"
    mask_is_atlas: False
    fwhm: 8
    load_confounds_params:
      strategy: [motion, high_pass, wm_csf, global_signal]
      motion: basic
      wm_csf: basic
      global_signal: basic
      demean: True
