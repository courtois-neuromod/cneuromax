# @package _global_

defaults:
  - friends_video_transformer/data@vision_data: episodes_vision

datamodule:
  _target_:
    "cneuromax.deeplearning.experiment.friends_video_transformer.\
    datamodule.FriendsDataModule"
  config:
    _target_:
      "cneuromax.deeplearning.experiment.friends_video_transformer.\
      datamodule.FriendsDataModuleConfig"
    subject: null
    episode_list: ${vision_data.episodes}
    use_bold: False
    modalities: [frames]
    mkv_data_dir: "/home/mstlaure/projects/rrg-pbellec/mstlaure/\
