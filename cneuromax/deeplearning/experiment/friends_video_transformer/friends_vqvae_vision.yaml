    time_downsample: 2
    n_chunks: 3
    resize_dim: 128
    dtype: float32
    min_lag: 3
    max_lag: 5
    tr: 1.49
    nifti_data_dir: null
    mask_path: null
    mask_is_atlas: False
    fwhm: null
    load_confounds_params: null
