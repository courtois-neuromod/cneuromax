# @package _global_
defaults:
  - /datamodule: kw_pred
  - /datamodule/dataset: kw_pred
  - /litmodule: kw_gen
  - override /litmodule/nnmodule: custom_dit
  - override /hydra/launcher: local
  - _self_

hydra:
  launcher:
    cpus_per_task: 12
    tasks_per_node: 1 #2
    gpus_per_node: 1 #2

config:
  device: gpu
datamodule:
  config:
    fixed_per_device_batch_size: 90 #128
    fixed_per_device_num_workers: ${hydra:launcher.cpus_per_task}
  dataset:
    config:
      root_data_dir: /data/
      #audio_stft_rel_dir: null
      audio_embeddings_rel_dir: null
      video_embeddings_rel_dir: null
      klk_wavs_rel_dir: HEMC_klk_wavs_9hz_accel/
litmodule:
  optimizer:
    lr: 1e-4
  config:
    log_val_wandb: True
    num_val_wandb_samples: 90
  nnmodule:
    klk_seq_len: 4000
    patch_size: 10
    num_klk_corners: 1
    depth: 6 #6
    audio_stft_rel_dir: ${datamodule.dataset.config.audio_stft_rel_dir}
    # yamllint disable-line rule:line-length
    audio_embeddings_rel_dir: ${datamodule.dataset.config.audio_embeddings_rel_dir}
