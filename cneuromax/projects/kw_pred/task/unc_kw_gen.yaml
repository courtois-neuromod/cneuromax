# @package _global_
defaults:
  - /datamodule: kw_pred
  - /datamodule/dataset: kw_pred
  - /litmodule: unc_kw_gen
  - override /litmodule/nnmodule: unet1d
  - override /hydra/launcher: local
  - _self_

hydra:
  launcher:
    cpus_per_task: 8
    # gpus_per_node: 1
config:
  device: cpu # gpu
datamodule:
  dataset:
    config:
      root_data_dir: /data/
      audio_embeddings_rel_dir: null
      audio_stft_rel_dir: null
      video_embeddings_rel_dir: null
      duration_seconds: 2
trainer:
  val_check_interval: .25
litmodule:
  config:
    log_val_wandb: True
