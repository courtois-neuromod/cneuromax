# @package _global_
defaults:
  - /datamodule: kw_pred
  - /datamodule/dataset: kw_pred
  - /litmodule: kw_gen
  - override /litmodule/nnmodule: custom_dit
  - override /hydra/launcher: local
  - _self_

hydra:
  launcher:
    cpus_per_task: 8
    gpus_per_node: 1
  sweeper:
    params:
      datamodule.dataset.config.dataset_percentage: 0.5, 1.0
      litmodule.nnmodule.depth: 1, 4
      litmodule.config.conditioning: random, linear, transformer

config:
  device: gpu
datamodule:
  config:
    val_percentage: 0.01
  dataset:
    config:
      root_data_dir: /data/
      audio_stft_rel_dir: null
      video_embeddings_rel_dir: null
      annot_rel_dir: null
      klk_wavs_rel_dir: HEMC_klk_wavs_9hz/
      duration_seconds: 10
      #dataset_percentage: 0.1
trainer:
  val_check_interval: 100
  num_sanity_val_steps: 0
  callbacks:
    - _target_: lightning.pytorch.callbacks.early_stopping.EarlyStopping
      monitor: val/loss
litmodule:
  config:
    log_val_wandb: True
    #conditioning: transformer
  nnmodule:
    input_size: 4000
    patch_size: 10
    in_channels: 1
    #depth: 1
    conditioning: ${litmodule.config.conditioning}
